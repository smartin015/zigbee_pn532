[env:seeed_xiao_esp32c6]
platform = espressif32@~6.9.0
board = seeed_xiao_esp32c6
framework = arduino

monitor_speed = 115200

; ── Zigbee enabled on ESP32-C6 ──────────────────────────────────────────
board_build.zigbee = yes

; ── Partition scheme with NVS for Zigbee persistence ────────────────────
board_build.partitions = zigbee.csv

lib_deps =
    adafruit/Adafruit PN532 @ ^1.3.0
    adafruit/Adafruit BusIO @ ^1.16.0

; ── Extra debug output for Zigbee stack (remove for production) ────────
build_flags =
    -DCONFIG_ZB_ENABLED=1
    -DCORE_DEBUG_LEVEL=4
