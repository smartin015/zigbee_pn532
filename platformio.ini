[env:seeed_xiao_esp32c6]
; Pinned to v55.03.39 (Arduino 3.3.9 / ESP-IDF 5.5.4)
; Do not use the floating "stable" URL — API breaks between releases.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = seeed_xiao_esp32c6
framework = arduino

monitor_speed = 115200

; Enable Zigbee in the ESP-IDF config
board_build.zigbee = yes

; Partition scheme with Zigbee NVRAM storage
board_build.partitions = zigbee.csv

lib_deps =
    adafruit/Adafruit PN532 @ ^1.3.0
    adafruit/Adafruit BusIO @ ^1.16.0

build_flags =
    -DCONFIG_ZB_ENABLED=1
    -DZIGBEE_MODE_ZR=1
    -Wl,--whole-archive
    -Wl,/root/.platformio/packages/framework-arduinoespressif32-libs/esp32c6/lib/libesp_zb_api.zczr.a
    -Wl,/root/.platformio/packages/framework-arduinoespressif32-libs/esp32c6/lib/libzboss_stack.zczr.a
    -Wl,/root/.platformio/packages/framework-arduinoespressif32-libs/esp32c6/lib/libzboss_port.native.a
    -Wl,--no-whole-archive
